name: Update version

on:
  push:
    branches: [main]

# Skip if this push was already made by the Actions bot — prevents infinite loop
jobs:
  version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write and commit version.js
        run: |
          HASH=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          echo "// Auto-generated by GitHub Actions — do not edit manually" > version.js
          echo "const GAME_VERSION = { hash: '${HASH}', date: '${DATE}' };" >> version.js

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.js
          git diff --staged --quiet || git commit -m "version: ${HASH} (${DATE})"
          git push
