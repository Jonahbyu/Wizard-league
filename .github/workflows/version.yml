name: Update version

on:
  push:
    branches: [main]

# Skip if this push was already made by the Actions bot — prevents infinite loop
jobs:
  version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Increment version and commit
        run: |
          HASH=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          # Read current version (format: 0.01.01)
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          # Increment patch, roll over to minor at 99
          PATCH=$((10#$PATCH + 1))
          if [ $PATCH -gt 99 ]; then
            PATCH=1
            MINOR=$((10#$MINOR + 1))
          fi
          if [ $MINOR -gt 99 ]; then
            MINOR=1
            MAJOR=$((MAJOR + 1))
          fi

          # Zero-pad to two digits
          MINOR=$(printf "%02d" $MINOR)
          PATCH=$(printf "%02d" $PATCH)
          VER="${MAJOR}.${MINOR}.${PATCH}"

          echo "$VER" > VERSION

          echo "// Auto-generated by GitHub Actions — do not edit manually" > version.js
          echo "const GAME_VERSION = { version: '${VER}', hash: '${HASH}', date: '${DATE}' };" >> version.js

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION version.js
          git diff --staged --quiet || git commit -m "version: v${VER} ${HASH} (${DATE})"
          git push
